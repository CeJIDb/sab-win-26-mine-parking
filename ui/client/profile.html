<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Настройки профиля — ЛК клиента</title>
  <link rel="stylesheet" href="../wireframe.css">
</head>
<body>
  <a href="#main-content" class="wf-skip-link">Перейти к содержимому</a>
  <div class="wf-page">
    <header class="wf-header" role="banner">
      <h1>Личный кабинет клиента</h1>
      <p class="wf-muted">Настройки профиля</p>
    </header>
    <nav class="wf-nav" aria-label="Навигация ЛК клиента">
      <ul>
        <li><a href="dashboard.html">Главная</a></li>
        <li><a href="bookings.html">Бронирование</a></li>
        <li><a href="contracts.html">Договоры</a></li>
        <li><a href="sessions-history.html">История сессий</a></li>
        <li><a href="vehicles.html">Список ТС</a></li>
        <li><a href="profile.html">Профиль</a></li>
        <li><a href="../site/index.html">На сайт</a></li>
        <li><a href="../site/login.html">Выход</a></li>
      </ul>
    </nav>
    <main id="main-content" class="wf-main">
      <p class="wf-context"><a href="dashboard.html">Главная ЛК</a> → Настройки профиля</p>
      <h2>Настройки профиля</h2>
      <form class="wf-form">
        <div class="wf-field">
          <label for="prof-phone">Телефон (для уведомлений)</label>
          <input id="prof-phone" type="tel" placeholder="+7 …">
        </div>
        <div class="wf-field">
          <label for="prof-email">E-mail (для уведомлений)</label>
          <input id="prof-email" type="email" placeholder="email@example.com">
        </div>
        <div class="wf-field">
          <label for="prof-name">ФИО</label>
          <input id="prof-name" type="text" placeholder="Фамилия Имя Отчество">
        </div>
        <div class="wf-actions">
          <button type="submit">Сохранить</button>
        </div>
      </form>
      <section class="wf-section">
        <h3>Смена пароля</h3>
        <form class="wf-form">
          <div class="wf-field">
            <label for="prof-old-pwd">Текущий пароль</label>
            <input id="prof-old-pwd" type="password" placeholder="Текущий пароль">
          </div>
          <div class="wf-field">
            <label for="prof-new-pwd">Новый пароль</label>
            <input id="prof-new-pwd" type="password" placeholder="Новый пароль">
          </div>
          <div class="wf-actions">
            <button type="submit">Изменить пароль</button>
          </div>
        </form>
      </section>
    </main>
  </div>
</body>
</html>

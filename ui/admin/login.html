<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в ЛК администратора</title>
  <link rel="stylesheet" href="../wireframe.css">
</head>
<body>
  <a href="#main-content" class="wf-skip-link">Перейти к содержимому</a>
  <div class="wf-page">
    <header class="wf-header" role="banner">
      <h1>Личный кабинет администратора</h1>
      <p class="wf-muted">Admin Panel — вход</p>
    </header>
    <nav class="wf-nav" aria-label="Навигация">
      <ul>
        <li><a href="../site/index.html">На сайт-визитку</a></li>
      </ul>
    </nav>
    <main id="main-content" class="wf-main">
      <h2>Авторизация ЛК администратора</h2>
      <p class="wf-error" role="alert" aria-live="polite" aria-hidden="true"></p>
      <form class="wf-form" action="index.html" method="get">
        <div class="wf-field">
          <label for="admin-login">Логин</label>
          <input id="admin-login" type="text" placeholder="Логин" required>
        </div>
        <div class="wf-field">
          <label for="admin-password">Пароль</label>
          <input id="admin-password" type="password" placeholder="Пароль" required>
        </div>
        <div class="wf-field">
          <label for="admin-code">Код подтверждения</label>
          <input id="admin-code" type="text" placeholder="Код (2FA)" required>
        </div>
        <div class="wf-actions">
          <button type="submit">Войти</button>
        </div>
      </form>
    </main>
  </div>
</body>
</html>

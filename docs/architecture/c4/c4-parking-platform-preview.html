<body>
  <h1>C4 — предпросмотр (SAB)</h1>
  <p class="lead">
    Файл собирается скриптом <code>scripts/build-c4-preview-html.mjs</code> из fenced-блоков Mermaid в
    <a href="c4-parking-platform.md">c4-parking-platform.md</a>.
    После правок диаграмм выполните: <code>npm run docs:c4-preview</code>
  </p>
  
    <section class="diagram-block" id="sec-0">
      <h2>Level 1 — System Context</h2>
      <div class="mermaid-host" id="mmd-0"></div>
    </section>

    <section class="diagram-block" id="sec-1">

    <section class="diagram-block" id="sec-2">
      <h2>Level 3 — Component (основной процесс)</h2>
      <div class="mermaid-host" id="mmd-2"></div>
    </section>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script>
    (async function () {
      const MERMAID_BLOCKS = ["C4Context\n    title System Context — Цифровая платформа парковки (SAB)\n\n    Person(client_fl, \"Клиент ФЛ\", \"Регистрируется,<br>бронирует и оплачивает\")\n    Person(client_ul, \"Клиент ЮЛ\", \"Управляет договором,<br>квотами и счетами\")\n    Person(guard, \"Охранник КПП\", \"Управляет допуском и<br>спорными ситуациями\")\n    Person(manager, \"Управляющий\", \"Настраивает тарифы и<br>управляет площадкой\")\n    Person(owner, \"Владелец\", \"Просматривает аналитику<br>и отчёты\")\n\n    System(platform, \"Цифровая платформа парковки\", \"Бронирование, доступ на КПП,<br>тарификация, оплата, договоры,<br>уведомления и отчётность\")\n\n    System_Ext(skud_lpr, \"СКУД + LPR\", \"Распознавание ГРЗ,<br>управление шлагбаумом\")\n    System_Ext(payment_provider, \"Платёжный провайдер\", \"Онлайн-оплата<br>(карты, СБП)\")\n    System_Ext(payment_terminal, \"Платёжные терминалы объекта\", \"КПП/выезд:<br>приём оплаты\")\n    System_Ext(ofd, \"ОФД\", \"Фискализация чеков\")\n    System_Ext(idp, \"SSO/IdP\", \"Яндекс ID, VK ID —<br>аутентификация ФЛ\")\n    System_Ext(notify_gw, \"Сервис уведомлений\", \"SMS и e-mail\")\n    System_Ext(edo, \"ЭДО\", \"Электронный<br>документооборот\")\n    System_Ext(displays, \"Информационные табло и дисплеи\", \"Въезд/выезд,<br>навигация (неск. устр.)\")\n\n    Rel(client_fl, platform, \"Регистрируется, бронирует, оплачивает и просматривает историю\")\n    Rel(client_ul, platform, \"Управляет договором, квотами, счетами и бронированиями\")\n    Rel(guard, platform, \"Рассматривает спорные случаи и управляет допуском\")\n    Rel(manager, platform, \"Настраивает тарифы и управляет площадкой\")\n    Rel(owner, platform, \"Просматривает аналитику и отчёты\")\n\n    Rel(platform, skud_lpr, \"Передаёт решение о допуске\")\n    Rel(skud_lpr, platform, \"Передаёт события въезда и выезда\")\n    Rel(platform, payment_provider, \"Проводит онлайн-оплату\")\n    Rel(platform, payment_terminal, \"Инициирует оплату и получает результат\")\n    Rel(platform, ofd, \"Регистрирует чек\")\n    Rel(platform, idp, \"Аутентифицирует клиента ФЛ\")\n    Rel(platform, notify_gw, \"Отправляет уведомления\")\n    Rel(platform, edo, \"Обменивается договорными документами\")\n    Rel(platform, displays, \"Передаёт данные для отображения\")\n\n    UpdateLayoutConfig($c4ShapeInRow=\"4\", $c4BoundaryInRow=\"1\")","C4Container\n    title Container — Цифровая платформа парковки (SAB)\n\n    Person(client_fl, \"Клиент ФЛ\", \"\")\n    Person(client_ul, \"Клиент ЮЛ\", \"\")\n    Person(guard, \"Охранник КПП\", \"\")\n    Person(manager, \"Управляющий\", \"\")\n    Person(owner, \"Владелец\", \"\")\n\n    System_Boundary(platform, \"Цифровая платформа парковки\") {\n        Container(spa_client, \"PWA / ЛК клиента\", \"SPA\", \"Бронирование, оплата,<br>история, профиль\")\n        Container(spa_staff, \"Служебный веб-интерфейс\", \"SPA\", \"КПП, администрирование,<br>обращения, отчёты,<br>RBAC по ролям\")\n        Container(api, \"Основной процесс (API)\", \"Модульный монолит\", \"12 доменных модулей,<br>Сервис приложения,<br>REST API, stateless\")\n        Container(lpr_adapter, \"Адаптер ЛПР/СКУД\", \"Отдельный процесс\", \"UDP→REST, буферизация,<br>Anti-Corruption Layer\")\n        Container(notif_worker, \"Агент доставки уведомлений\", \"Отдельный процесс\", \"Outbox → SMS/email/push,<br>at-least-once\")\n        ContainerDb(db, \"PostgreSQL\", \"РСУБД\", \"Единая БД,<br>schema-per-module,<br>Outbox-таблица\")\n    }\n\n    System_Ext(skud_lpr, \"СКУД + LPR\", \"Шлагбаум, камеры ГРЗ\")\n    System_Ext(payment_provider, \"Платёжный провайдер\", \"Онлайн-оплата\")\n    System_Ext(payment_terminal, \"Платёжные терминалы объекта\", \"КПП/выезд:<br>приём оплаты\")\n    System_Ext(ofd, \"ОФД\", \"Фискализация\")\n    System_Ext(idp, \"SSO/IdP\", \"OAuth2/OIDC\")\n    System_Ext(notify_gw, \"Сервис уведомлений\", \"SMS и e-mail\")\n    System_Ext(edo, \"ЭДО\", \"Электронный документооборот\")\n    System_Ext(displays, \"Информационные табло и дисплеи\", \"Въезд/выезд,<br>навигация (неск. устр.)\")\n\n    Rel(client_fl, spa_client, \"Использует\", \"HTTPS\")\n    Rel(client_ul, spa_client, \"Использует\", \"HTTPS\")\n    Rel(guard, spa_staff, \"Использует\", \"HTTPS\")\n    Rel(manager, spa_staff, \"Использует\", \"HTTPS\")\n    Rel(owner, spa_staff, \"Использует\", \"HTTPS\")\n\n    Rel(spa_client, api, \"API-запросы\", \"HTTPS/JSON\")\n    Rel(spa_staff, api, \"API-запросы\", \"HTTPS/JSON\")\n\n    Rel(api, db, \"Читает/пишет\", \"SQL\")\n    Rel(notif_worker, db, \"Читает Outbox\", \"SQL\")\n    Rel(lpr_adapter, api, \"Событие ГРЗ → Доступ\", \"REST\")\n\n    Rel(skud_lpr, lpr_adapter, \"Событие ГРЗ\", \"UDP\")\n    Rel(api, skud_lpr, \"allow/deny → шлагбаум\", \"REST\")\n    Rel(api, payment_provider, \"Онлайн-платежи\", \"REST API\")\n    Rel(api, payment_terminal, \"Инициирует оплату и получает результат\", \"REST API\")\n    Rel(api, ofd, \"Фискализация\", \"REST API\")\n    Rel(api, idp, \"Аутентификация\", \"OAuth2/OIDC\")\n    Rel(api, edo, \"Документы\", \"REST API\")\n    Rel(api, displays, \"Данные для отображения\", \"REST API\")\n    Rel(notif_worker, notify_gw, \"Отправка\", \"REST API\")\n\n    UpdateLayoutConfig($c4ShapeInRow=\"4\", $c4BoundaryInRow=\"1\")","C4Component\n    title Component — Основной процесс (API)\n\n    Container_Boundary(api, \"Основной процесс (модульный монолит)\") {\n\n        Component(app_svc, \"Сервис приложения\", \"Оркестрация\", \"Координация сквозных<br>сценариев (въезд, выезд,<br>оплата, ручной допуск)\")\n        Component(auth, \"Инфраструктура аутентификации\", \"Инфраструктура\", \"SSO, пароли, TOTP 2FA,<br>JWT-проверка\")\n\n        Component(access, \"Доступ\", \"Core\", \"разрешить/запретить на КПП,<br>политика въезда/выезда,<br>чёрный список, аудит\")\n        Component(booking, \"Бронирование\", \"Core\", \"Бронирование,<br>авто-бронирование,<br>резервирование ПМ\")\n        Component(session, \"Сессия\", \"Core\", \"Парковочная сессия,<br>журнал въезда/выезда\")\n        Component(tariff, \"Тариф\", \"Core\", \"Тарифы,<br>preview суммы,<br>расчёт стоимости\")\n\n        Component(payment, \"Платёж\", \"Supporting\", \"Платежи, фиксированная сумма,<br>возвраты, чеки\")\n        Component(contracts, \"Договор\", \"Supporting\", \"Договоры, квоты,<br>абонементы\")\n        Component(client, \"Клиент\", \"Supporting\", \"Клиент, организация,<br>ТС, ГРЗ, ПДн\")\n        Component(facility, \"Площадка\", \"Supporting\", \"Секторы, ПМ, КПП,<br>конфигурация\")\n        Component(support, \"Обращение\", \"Supporting\", \"Обращения, тикеты\")\n        Component(employee, \"Сотрудник\", \"Supporting\", \"Сотрудники, RBAC\")\n\n        Component(notification, \"Уведомление\", \"Generic\", \"Уведомления, шаблоны,<br>очередь (Outbox)\")\n        Component(report, \"Отчёт\", \"Generic\", \"Read-модели, аналитика,<br>отчёты (CQRS)\")\n    }\n\n    Container_Ext(lpr_adapter, \"Адаптер ЛПР/СКУД\", \"Отдельный процесс\")\n    Container_Ext(spa, \"SPA (клиент / админ / КПП)\", \"Фронтенд\")\n    ContainerDb_Ext(db, \"PostgreSQL\", \"schema-per-module\")\n\n    Rel(spa, app_svc, \"REST API\", \"HTTPS/JSON\")\n    Rel(lpr_adapter, app_svc, \"Событие ГРЗ\", \"REST\")\n\n    Rel(app_svc, access, \"проверитьВъезд() / проверитьВыезд()\")\n    Rel(app_svc, booking, \"получить / завершить\")\n    Rel(app_svc, session, \"открыть() / завершить()\")\n    Rel(app_svc, tariff, \"рассчитатьТекущуюСумму()\")\n    Rel(app_svc, payment, \"создать() / провести()\")\n\n    Rel(access, booking, \"естьАктивнаяБронь? / создатьАвтоБронирование()\")\n    Rel(access, contracts, \"естьАктивныйДоговор?\")\n    Rel(access, session, \"естьАктивнаяСессия?\")\n    Rel(access, payment, \"естьДолг? / оплатаПроведена?\")\n    Rel(access, client, \"ГРЗ → тсИд → клиентИд\")\n    Rel(access, facility, \"Конфигурация КПП\")\n\n    Rel(booking, facility, \"Доступность ПМ\")\n    Rel(booking, tariff, \"Предварительный расчёт\")\n    Rel(contracts, booking, \"Квоты → бронь\")\n    Rel(contracts, tariff, \"Договорные ставки\")\n\n    Rel(session, notification, \"Событие сессии\")\n    Rel(booking, notification, \"Событие бронирования\")\n    Rel(access, notification, \"Отказ / предупреждение\")\n    Rel(payment, notification, \"Чек / возврат\")\n    Rel(support, payment, \"Запрос возврата\")\n    Rel(employee, access, \"Ручной допуск охранника\")\n    Rel(employee, session, \"Просмотр активных сессий\")\n\n    Rel(booking, report, \"Доменные события\")\n    Rel(session, report, \"Доменные события\")\n    Rel(payment, report, \"Доменные события\")\n    Rel(access, report, \"Аудит решений\")\n\n    Rel(access, db, \"\", \"\")\n    Rel(booking, db, \"\", \"\")\n    Rel(session, db, \"\", \"\")\n    Rel(payment, db, \"\", \"\")\n    Rel(client, db, \"\", \"\")\n    Rel(facility, db, \"\", \"\")\n    Rel(notification, db, \"\", \"\")\n    Rel(report, db, \"\", \"\")\n\n    UpdateLayoutConfig($c4ShapeInRow=\"4\", $c4BoundaryInRow=\"1\")"];
      mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose",
        theme: "neutral",
      });
      const nodes = [];
      for (var i = 0; i < MERMAID_BLOCKS.length; i++) {
        var el = document.createElement("div");
        el.className = "mermaid";
        el.textContent = MERMAID_BLOCKS[i];
        document.getElementById("mmd-" + i).appendChild(el);
        nodes.push(el);
      }
      await mermaid.run({ nodes: nodes });
    })();
  </script>
</body>
</html>

name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "docs/**"
      - "chore/**"
      - "hotfix/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch naming
        run: node ./scripts/check-branch-name.mjs

      - name: Validate traceability guard
        run: |
          node ./scripts/check-traceability-matrix-update.mjs

  quality-gates:
    runs-on: ubuntu-latest
    needs: policy-checks
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci:check
